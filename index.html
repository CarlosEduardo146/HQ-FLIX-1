<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<title>HQflix</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body { overflow-x: hidden; }

/* FUNDO ANIMADO */
@keyframes moveBg {
    0% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.1) translateY(-20px); }
    100% { transform: scale(1) translateY(0); }
}

.bg-anim {
    animation: moveBg 12s infinite ease-in-out;
}

/* PARTÍCULAS */
.particles {
    background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
    background-size: 30px 30px;
}

/* LOGIN CARD */
.login-box {
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    animation: fadeUp 1s ease;
}

/* ANIMAÇÃO */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* GLOW */
.glow {
    box-shadow: 0 0 40px rgba(255,0,0,0.3);
}

/* BOTÃO */
.btn {
    transition: all .3s;
}
.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(255,0,0,0.7);
}

/* HERO */
#hero {
    transition: 1s;
}
#hero:hover {
    transform: scale(1.03);
}
</style>

</head>

<body class="bg-black text-white font-[Poppins]">

<!-- FUNDO CINEMÁTICO -->
<div class="fixed inset-0 -z-10 bg-anim bg-gradient-to-br from-black via-red-900/20 to-black"></div>
<div class="fixed inset-0 -z-10 particles opacity-20"></div>

<!-- LOGIN -->
<div id="loginScreen" class="fixed inset-0 flex items-center justify-center z-50 p-4">

<div class="login-box glow p-8 md:p-10 rounded-3xl w-full max-w-md text-center">

<h1 class="text-5xl font-extrabold mb-3">
<span class="text-red-500">HQ</span>flix
</h1>

<p class="text-gray-400 mb-4 text-sm">
Sua plataforma de HQs estilo cinema 🎬
</p>

<!-- TEXTO PRO -->
<div class="bg-gradient-to-r from-green-500/20 to-emerald-500/20 border border-green-400/30 text-green-300 text-sm p-4 rounded-xl mb-6 shadow-lg">
🚀 Acesso ilimitado • 💥 100% gratuito • 📚 Leia sem limites
</div>

<!-- BENEFÍCIOS -->
<div class="text-left text-gray-300 text-sm space-y-2 mb-6">
<p>🎬 Interface estilo Netflix</p>
<p>⚡ Carregamento rápido</p>
<p>❤️ Salve favoritos</p>
<p>🔄 Continue assistindo</p>
</div>

<!-- LOGIN GOOGLE -->
<div class="g_id_signin"
data-type="standard"
data-theme="filled_black"
data-size="large"
data-shape="pill">
</div>

<div id="g_id_onload"
data-client_id="80627509151-5ksol247ga6a1t4loe6qp8ibgk90m0bq.apps.googleusercontent.com"
data-callback="handleCredentialResponse">
</div>

</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header class="flex justify-between items-center px-6 py-4 bg-black/60 backdrop-blur border-b border-white/10">
<h1 class="text-2xl font-bold"><span class="text-red-500">HQ</span>flix</h1>

<div class="flex items-center gap-3">
<span id="userName" class="text-sm"></span>
<img id="userImg" class="w-10 h-10 rounded-full">
<button onclick="logout()" class="text-red-400 text-sm">Sair</button>
</div>
</header>

<section id="hero" class="relative h-[80vh] flex items-end p-10 bg-cover bg-center">
<div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent"></div>

<div class="relative z-10">
<h1 id="heroTitle" class="text-6xl font-extrabold">Carregando...</h1>

<div class="flex gap-4 mt-6">
<a id="heroBtn" target="_blank" class="btn bg-red-600 px-8 py-3 rounded-full text-lg">
▶ Ler agora
</a>

<button id="favBtn" class="btn bg-white/10 px-6 py-3 rounded-full">
⭐ Favoritar
</button>
</div>
</div>
</section>

<div class="p-6 flex justify-center">
<input id="search" placeholder="🔍 Buscar HQ..." 
class="p-4 w-full max-w-xl rounded-full text-black"
onkeyup="filtrarHQs()">
</div>

<main id="conteudo" class="px-6 pb-20"></main>

</div>

<script>
const API_KEY = "AIzaSyCh9dW4ehn2zxq_WPLHjL_Z-DJkzk81P1Y";
const FOLDER_ID = "1JQYaGj4mFqv0vmqWwbmoGPfk9j6eVCe5";

let todosArquivos = [];
let atual = null;

/* ===== CARDS ===== */
function criarCard(file){
const thumb=file.thumbnailLink?file.thumbnailLink.replace('=s220','=s800'):'';

const card=document.createElement('div');
card.className="min-w-[150px] md:min-w-[200px] cursor-pointer transition hover:scale-110";

card.innerHTML=`
<div class="rounded-xl overflow-hidden shadow-lg border border-white/10">
<img src="${thumb}" class="w-full h-56 md:h-72 object-cover">
</div>
<p class="mt-2 text-xs md:text-sm truncate hover:text-red-400">${file.name}</p>
`;

card.onclick=()=>abrirHQ(file);
return card;
}

/* ===== HERO ===== */
function definirHero(file){
atual=file;
const hero=document.getElementById('hero');

hero.style.backgroundImage=`url('${file.thumbnailLink}')`;
document.getElementById('heroTitle').innerText=file.name;
document.getElementById('heroBtn').href=`https://drive.google.com/file/d/${file.id}/preview`;
}

/* ===== ABRIR HQ ===== */
function abrirHQ(file){
definirHero(file);
salvarContinuar(file);
window.open(`https://drive.google.com/file/d/${file.id}/preview`);
}

/* ===== FAVORITOS ===== */
function salvarFavorito(file){
let favs=JSON.parse(localStorage.getItem('favs')||'[]');

if(!favs.find(f=>f.id===file.id)){
favs.push(file);
localStorage.setItem('favs',JSON.stringify(favs));
renderFavoritos();
}
}

/* ===== CONTINUAR ===== */
function salvarContinuar(file){
let lista=JSON.parse(localStorage.getItem('continue')||'[]');

lista=lista.filter(f=>f.id!==file.id);
lista.unshift(file);

localStorage.setItem('continue',JSON.stringify(lista.slice(0,10)));
renderContinuar();
}

/* ===== RENDER ===== */
function renderFavoritos(){
const container=document.getElementById('favoritos');
if(!container) return;

container.innerHTML='';
JSON.parse(localStorage.getItem('favs')||'[]').forEach(file=>{
container.appendChild(criarCard(file));
});
}

function renderContinuar(){
const container=document.getElementById('continue');
if(!container) return;

container.innerHTML='';
JSON.parse(localStorage.getItem('continue')||'[]').forEach(file=>{
container.appendChild(criarCard(file));
});
}

/* ===== BOTÃO FAVORITO ===== */
setTimeout(()=>{
const favBtn=document.getElementById('favBtn');
if(favBtn){
favBtn.onclick=()=>{ if(atual) salvarFavorito(atual); };
}
},1000);

/* ===== CARREGAR DRIVE ===== */
async function carregarHQs(){
const container=document.getElementById('conteudo');

container.innerHTML=`<div class="flex justify-center py-20">
<div class="animate-spin h-10 w-10 border-t-4 border-red-500 rounded-full"></div>
</div>`;

try{

const pastas=await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='application/vnd.google-apps.folder'&key=${API_KEY}&fields=files(id,name)`).then(r=>r.json());

container.innerHTML='';

for(const pasta of pastas.files){

const secao=document.createElement('div');

secao.innerHTML=`
<h2 class="text-2xl md:text-3xl font-bold mb-4">🔥 ${pasta.name}</h2>
<div class="flex gap-4 md:gap-6 overflow-x-auto pb-4" id="pasta-${pasta.id}"></div>
`;

container.appendChild(secao);

const arquivos=await fetch(`https://www.googleapis.com/drive/v3/files?q='${pasta.id}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType,thumbnailLink)`).then(r=>r.json());

const grid=document.getElementById(`pasta-${pasta.id}`);

arquivos.files.forEach(file=>{
if(file.mimeType==='application/pdf'){
todosArquivos.push(file);
grid.appendChild(criarCard(file));
}
});
}

if(todosArquivos.length){
definirHero(todosArquivos[0]);
}

renderFavoritos();
renderContinuar();

}catch(e){
container.innerHTML="<p class='text-center text-red-400'>Erro ao carregar HQs 😢</p>";
console.error(e);
}
}

/* ===== BUSCA ===== */
function filtrarHQs(){
const texto=document.getElementById('search').value.toLowerCase();

document.querySelectorAll('#conteudo p').forEach(p=>{
p.parentElement.style.display=p.innerText.toLowerCase().includes(texto)?'block':'none';
});
}

/* ===== LOGIN ===== */
function handleCredentialResponse(response){
localStorage.setItem("user",response.credential);
iniciarApp();
}

function iniciarApp(){
document.getElementById("loginScreen").style.display="none";
document.getElementById("app").classList.remove("hidden");

const user=parseJwt(localStorage.getItem("user"));

if(user){
document.getElementById("userName").innerText=user.name;
document.getElementById("userImg").src=user.picture;
}

carregarHQs();
}

/* ===== JWT ===== */
function parseJwt(token){
let base64Url=token.split('.')[1];
let base64=base64Url.replace(/-/g,'+').replace(/_/g,'/');
let jsonPayload=decodeURIComponent(atob(base64).split('').map(c=>'%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
return JSON.parse(jsonPayload);
}

/* ===== LOGOUT ===== */
function logout(){
localStorage.removeItem("user");
location.reload();
}

/* ===== AUTO LOGIN ===== */
window.onload=()=>{
if(localStorage.getItem("user")) iniciarApp();
};
</script>
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
